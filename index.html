// HELPERS

const fmt = n => "$" + (+n||0).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d+"T00:00:00").toLocaleDateString("es-EC") : "—";
const diasMora = fv => {
  if(!fv) return 0;
  const d = Math.floor((new Date()-new Date(fv+"T00:00:00"))/86400000);
  return d>0?d:0;
};
const calcCuota = (cap,meses) => {
  const i = TASA_ANUAL/12;
  return cap*(i*Math.pow(1+i,meses))/(Math.pow(1+i,meses)-1);
};

// BUSCADOR ESTILIZADO REUTILIZABLE
// ══════════════════════════════════════════
function Buscador({valor,onChange,placeholder="🔍 Buscar por nombre, cédula, teléfono..."}){
  return(
    <div style={{position:"relative",marginBottom:16}}>
      <input
        value={valor}
        onChange={e=>onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width:"100%",
          background:"#0d1a2e",
          border:`2px solid ${valor?C.gold:C.border}`,
          borderRadius:10,
          padding:"11px 44px 11px 16px",
          color:C.white,
          fontSize:14,
          outline:"none",
          transition:"border 0.2s",
          boxSizing:"border-box",
          fontFamily:"'DM Mono',monospace",
        }}
      />
      {valor&&(
        <button onClick={()=>onChange("")} style={{
          position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
          background:"transparent",border:"none",color:C.muted,
          fontSize:18,cursor:"pointer",lineHeight:1,padding:0
        }}>✕</button>
      )}
      {!valor&&(
        <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none"}}>🔍</span>
      )}
    </div>
  );
}

function Badge({color,children}){
  const m={
    green:{bg:"#052e16",text:"#4ade80",border:"#14532d"},
    red:{bg:"#2d0a0a",text:"#f87171",border:"#7f1d1d"},
    yellow:{bg:"#2d1f00",text:"#fbbf24",border:"#78350f"},
    blue:{bg:"#0a1628",text:"#60a5fa",border:"#1e3a5f"},
    purple:{bg:"#1a0a2e",text:"#c4b5fd",border:"#4c1d95"},
    gray:{bg:"#1e2d3d",text:"#94a3b8",border:"#2d4160"},
  };
  const s=m[color]||m.gray;
  return <span style={{background:s.bg,color:s.text,border:`1px solid ${s.border}`,padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase"}}>{children}</span>;
}

function StatCard({label,value,sub,color}){
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",borderLeft:`3px solid ${color||C.gold}`,flex:1,minWidth:140}}>
      <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5}}>{label}</div>
      <div style={{fontSize:24,fontWeight:800,color:C.white,fontFamily:"'DM Mono',monospace"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function Loader({text="Cargando..."}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60,flexDirection:"column",gap:16}}>
      <div className="spin" style={{fontSize:28}}>⟳</div>
      <div style={{color:C.muted,fontSize:13}}>{text}</div>
    </div>
  );
}

function MsgError({msg,onRetry}){
  return(
    <div style={{background:"#2d0a0a",border:"1px solid #7f1d1d",borderRadius:12,padding:20,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
      <span style={{color:"#f87171",fontSize:13}}>⚠️ {msg}</span>
      {onRetry&&<button onClick={onRetry} style={{background:C.red,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Reintentar</button>}
    </div>
  );
}

function ConfigSupabase({onSave}){
  const [url,setUrl]=useState(localStorage.getItem("sb_url")||"");
  const [key,setKey]=useState(localStorage.getItem("sb_key")||"");
  const [testing,setTesting]=useState(false);
  const [msg,setMsg]=useState("");

  const probar=async()=>{
    if(!url||!key){setMsg("❌ Completa ambos campos.");return;}
    setTesting(true);setMsg("");
    try{
      const {createClient}=supabase;
      const cl=createClient(url.trim(),key.trim());
      const {error}=await cl.from("usuarios_sistema").select("id").limit(1);
      if(error) throw error;
      localStorage.setItem("sb_url",url.trim());
      localStorage.setItem("sb_key",key.trim());
      setMsg("✅ Conexión exitosa. Cargando sistema...");
      setTimeout(()=>onSave(url.trim(),key.trim()),1200);

      setMsg("❌ Error: "+e.message+". Verifica la URL y la clave.");

            <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:6}}>URL del Proyecto</label>
            <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxxxxxxxxx.supabase.co"
              style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
          </div>

          <div style={{marginBottom:20}}>
            <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:6}}>Anon Key (clave pública)</label>
            <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              type="password"
              style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
          </div>

          {msg&&<div style={{marginBottom:14,padding:"10px 14px",borderRadius:8,background:msg.startsWith("✅")?"#052e16":"#2d0a0a",color:msg.startsWith("✅")?"#4ade80":"#f87171",fontSize:13}}>{msg}</div>}

          <button onClick={probar} disabled={testing} style={{width:"100%",background:testing?"#1e2d45":C.gold,color:testing?C.muted:"#000",border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:14,cursor:testing?"not-allowed":"pointer"}}>
            {testing?<><span className="spin">⟳</span> Probando conexión...</>:"Conectar y Entrar →"}
          </button>
        </div>

        <div style={{marginTop:20,background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
          <div style={{color:C.gold,fontSize:11,fontWeight:700,marginBottom:10}}>¿Dónde encuentro estos datos?</div>
          <div style={{color:C.muted,fontSize:12,lineHeight:1.8}}>
            1. Ve a <strong style={{color:C.white}}>supabase.com</strong> → Tu proyecto<br/>
            2. Settings → API<br/>
            3. Copia <strong style={{color:C.white}}>Project URL</strong> y <strong style={{color:C.white}}>anon public key</strong>
          </div>
        </div>
      </div>
    </div>
  );
}

function Login({db,onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);

  const intentar=async()=>{
    setError("");setLoading(true);
    try{
      const {data,error:e}=await db.from("usuarios_sistema")
        .select("*").eq("usuario",user.trim().toLowerCase()).eq("clave",pass).eq("activo",true).single();
      if(e||!data){setError("Usuario o clave incorrectos.");setLoading(false);return;}
      onLogin(data);
    }catch(e){setError("Error de conexión: "+e.message);}
    setLoading(false);

// DASHBOARD
// ══════════════════════════════════════════
function Dashboard({db}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [enMora,setEnMora]=useState([]);
  const [cuentas,setCuentas]=useState([]);
  const [socios,setSocios]=useState([]);
  const [exportando,setExportando]=useState(false);

  const cargar=useCallback(async()=>{
    setLoading(true);setError("");
    try{
      const [{data:d1},{data:s},{data:bancos}]=await Promise.all([
        db.from("v_dashboard").select("*").single(),
        db.from("socios").select("*").eq("activo",true).order("nombre"),
        db.from("cuentas_banco").select("*").eq("activa",true),
      ]);
      setData(d1);setSocios(s||[]);
      setEnMora((s||[]).filter(x=>diasMora(x.fecha_vence)>0&&x.saldo_credito>0));
      setCuentas(bancos||[]);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[db]);

  useEffect(()=>{cargar();},[cargar]);

  // ── Calcular indicadores NIIF desde socios cargados ──────
  const totalAhorros=socios.reduce((a,s)=>a+s.saldo_ahorro,0);
  const sociosCredito=socios.filter(s=>s.saldo_credito>0);
  const totalCarteraNiif=sociosCredito.reduce((a,s)=>a+s.saldo_credito,0);
  const totalCuotasMes=sociosCredito.reduce((a,s)=>a+s.cuota_mensual,0);
  const sociosAlDia=sociosCredito.filter(s=>diasMora(s.fecha_vence)===0).length;
  const sociosMoraCount=sociosCredito.filter(s=>diasMora(s.fecha_vence)>0).length;
  // Valores NIIF fijos del corte 23/03/2026
  const NIIF={
    creditos_activos:21,
    monto_desembolsado:47856.27,
    capital_recuperado:11780.70,
    saldo_niif:36075.57,
    int_devengado:3293.76,
    int_por_devengar:6030.00,
    int_total:9323.76,
    recuperacion:0.2462,
    cartera_pend:0.7538,
    rendimiento:0.1948,
  };

  // ── Exportar Excel Cartera ────────────────────────────────
  const exportarCartera=()=>{
    setExportando(true);
    const hoyStr=new Date().toLocaleDateString("es-EC");
    let csv=`FINANCIERA CADENA — CARTERA DE CRÉDITOS ACTIVA\nCorte: ${hoyStr}\nMétodo: NIIF 9 — Interés Efectivo | Saldo = Capital pendiente\n\n`;
    csv+="CÓDIGO,NOMBRE,CÉDULA,TELÉFONO,SALDO CAPITAL (NIIF),CUOTA MENSUAL,PRÓX. VENCIMIENTO,ESTADO\n";
    sociosCredito.forEach(s=>{
      const m=diasMora(s.fecha_vence);
      const est=m>0?`EN MORA (${m} días)`:"VIGENTE";
      csv+=`${s.codigo},"${s.nombre}",${s.cedula},${s.telefono||""},${s.saldo_credito.toFixed(2)},${s.cuota_mensual.toFixed(2)},${s.fecha_vence||""},${est}\n`;
    });
    csv+=`\nTOTAL CARTERA NIIF,,,,${totalCarteraNiif.toFixed(2)},${totalCuotasMes.toFixed(2)},,\n`;
    csv+=`\n── RESUMEN NIIF 9 ──\nTotal créditos activos,${NIIF.creditos_activos}\n`;
    csv+=`Monto total desembolsado,$${NIIF.monto_desembolsado.toFixed(2)}\n`;
    csv+=`Capital total recuperado,$${NIIF.capital_recuperado.toFixed(2)}\n`;
    csv+=`SALDO CARTERA NIIF,$${NIIF.saldo_niif.toFixed(2)}\n`;
    csv+=`Interés devengado,$${NIIF.int_devengado.toFixed(2)}\n`;
    csv+=`Interés por devengar,$${NIIF.int_por_devengar.toFixed(2)}\n`;
    csv+=`Interés total,$${NIIF.int_total.toFixed(2)}\n`;
    csv+=`Recuperación de capital,${(NIIF.recuperacion*100).toFixed(2)}%\n`;
    csv+=`Rendimiento total,${(NIIF.rendimiento*100).toFixed(2)}%\n`;
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`Cartera_NIIF_CADENA_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    setExportando(false);
  };

  // ── Exportar Excel Ahorros ────────────────────────────────
  const exportarAhorros=()=>{
    setExportando(true);
    const hoyStr=new Date().toLocaleDateString("es-EC");
    let csv=`FINANCIERA CADENA — MAESTRO DE AHORROS\nCorte: ${hoyStr}\n\n`;
    csv+="CÓDIGO,NOMBRE,CÉDULA,TELÉFONO,SALDO AHORRO,SALDO CRÉDITO,ESTADO\n";
    socios.forEach(s=>{
      const est=s.saldo_credito>0?(diasMora(s.fecha_vence)>0?"CON CRÉDITO EN MORA":"CON CRÉDITO AL DÍA"):"SIN CRÉDITO";
      csv+=`${s.codigo},"${s.nombre}",${s.cedula},${s.telefono||""},${s.saldo_ahorro.toFixed(2)},${s.saldo_credito.toFixed(2)},${est}\n`;
    });
    csv+=`\nTOTAL,,,,${totalAhorros.toFixed(2)},${totalCarteraNiif.toFixed(2)},\n`;
    csv+=`\n── RESUMEN ──\nTotal socios activos,${socios.length}\n`;
    csv+=`Total ahorros,$${totalAhorros.toFixed(2)}\n`;
    csv+=`Total cartera NIIF,$${totalCarteraNiif.toFixed(2)}\n`;
    csv+=`Socios con crédito,${sociosCredito.length}\n`;
    csv+=`Socios al día,${sociosAlDia}\n`;
    csv+=`Socios en mora,${sociosMoraCount}\n`;
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`Ahorros_CADENA_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    setExportando(false);
  };

  if(loading) return <Loader text="Cargando dashboard..."/>;
  if(error) return <MsgError msg={error} onRetry={cargar}/>;

  const hoy=new Date().toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"});

  return(
    <div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Panel de Control</h2>
          <p style={{color:C.muted,fontSize:13}}>Corte al {hoy}</p>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button onClick={exportarAhorros} disabled={exportando}
            style={{background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            📥 Exportar Ahorros
          </button>
          <button onClick={exportarCartera} disabled={exportando}
            style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            📥 Exportar Cartera NIIF
          </button>
          <button onClick={cargar} style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer"}}>
            🔄 Actualizar
          </button>
        </div>
      </div>

      {/* TARJETAS PRINCIPALES */}
      <div className="stat-grid" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        <StatCard label="Total Ahorros" value={fmt(totalAhorros)} color={C.green}/>
        <StatCard label="Cartera NIIF" value={fmt(totalCarteraNiif)} sub="capital pendiente" color={C.blue}/>
        <StatCard label="Saldo Bancos" value={fmt(data?.total_bancos||0)} color={C.gold}/>
        <StatCard label="Socios en Mora" value={sociosMoraCount} sub={`de ${sociosCredito.length} con crédito`} color={C.red}/>
        <StatCard label="Sin Conciliar" value={data?.sin_conciliar||0} sub="movimientos" color={C.yellow}/>
        <StatCard label="Patrimonio/Reserva" value={fmt(data?.total_patrimonio||0)} color={C.purple}/>
      </div>

      {/* INDICADORES NIIF 9 */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>
            📊 Resumen Ejecutivo NIIF 9 — Método Interés Efectivo
          </div>
          <span style={{color:C.muted,fontSize:11}}>Corte: 23/03/2026</span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          {/* Balance de Cartera */}
          <div style={{background:C.bg,borderRadius:10,padding:14,borderLeft:`3px solid ${C.blue}`}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>── Balance de Cartera ──</div>
            {[
              ["Créditos activos",NIIF.creditos_activos,""],
              ["Monto desembolsado",fmt(NIIF.monto_desembolsado),""],
              ["Capital recuperado",fmt(NIIF.capital_recuperado),C.green],
              ["Saldo NIIF (capital)",fmt(NIIF.saldo_niif),C.blue],
            ].map(([lbl,val,col])=>(

                <span style={{color:col||C.white,fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</span>
              </div>
            ))}
          </div>

          {/* Ingresos */}
          <div style={{background:C.bg,borderRadius:10,padding:14,borderLeft:`3px solid ${C.green}`}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>── Ingresos ──</div>
            {[
              ["Int. devengado (cobrado)",fmt(NIIF.int_devengado),C.green],
              ["Int. por devengar",fmt(NIIF.int_por_devengar),C.yellow],
              ["Interés total período",fmt(NIIF.int_total),C.gold],
              ["Cuota total mensual",fmt(totalCuotasMes),C.blue],
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:11}}>{lbl}</span>
                <span style={{color:col||C.white,fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</span>
              </div>
            ))}
          </div>

          {/* Indicadores */}
          <div style={{background:C.bg,borderRadius:10,padding:14,borderLeft:`3px solid ${C.purple}`}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>── Indicadores ──</div>
            {[
              ["Recuperación capital",(NIIF.recuperacion*100).toFixed(2)+"%",C.green],
              ["Cartera pendiente",(NIIF.cartera_pend*100).toFixed(2)+"%",C.blue],
              ["Rendimiento int/capital",(NIIF.rendimiento*100).toFixed(2)+"%",C.gold],
              ["Socios al día / mora",`${sociosAlDia} / ${sociosMoraCount}`,sociosMoraCount>0?C.red:C.green],
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:11}}>{lbl}</span>
                <span style={{color:col||C.white,fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Tasas flat */}
        <div style={{background:C.bg,borderRadius:10,padding:14,borderLeft:`3px solid ${C.gold}`}}>
          <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>── Tasas Flat por Tipo de Crédito ──</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[
              ["10% flat/año","→ TNA 17.98% → TEA 19.54%","Créditos Extraordinarios 12m",C.blue],
              ["13% flat/año","→ TNA 23.43% → TEA 26.18%","Créditos Ordinarios estándar",C.green],
              ["0% flat/año","Sin interés","Acuerdo pago (cred. 082)",C.muted],
            ].map(([tasa,equiv,tipo,col])=>(
              <div key={tasa} style={{flex:1,minWidth:160,background:C.surface,borderRadius:8,padding:"10px 14px",border:`1px solid ${C.border}`}}>
                <div style={{color:col,fontSize:14,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{tasa}</div>
                <div style={{color:C.white,fontSize:11,marginTop:2}}>{equiv}</div>
                <div style={{color:C.muted,fontSize:10,marginTop:3}}>{tipo}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* MORA + BANCOS */}
      <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:14}}>⚠️ Socios en Mora</div>
          {enMora.length===0
            ?<p style={{color:C.muted,fontSize:13}}>✅ Sin mora activa</p>
            :enMora.map(s=>{
              const d=diasMora(s.fecha_vence);
              const intM=(s.saldo_credito*MORA_DIARIA*d).toFixed(2);
              return(
                <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{color:C.white,fontSize:13,fontWeight:600}}>{s.nombre}</div>
                    <div style={{color:C.muted,fontSize:12}}>{fmt(s.saldo_credito)} · Int. mora: ${intM}</div>
                  </div>
                  <Badge color={d>15?"red":"yellow"}>{d} días</Badge>
                </div>
              );
            })}
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <div style={{color:C.gold,fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:14}}>🏦 Estado Cuentas Bancarias</div>
          {cuentas.filter((c,i,a)=>a.findIndex(x=>x.banco===c.banco&&x.numero===c.numero)===i).map(c=>{
            const diff=c.saldo_banco-c.saldo_sistema;
            return(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div>
                  <div style={{color:C.white,fontSize:13,fontWeight:600}}>{c.banco}</div>
                  <div style={{color:C.muted,fontSize:11}}>{c.tipo} · {c.numero}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.white,fontSize:13,fontFamily:"'DM Mono',monospace"}}>{fmt(c.saldo_banco)}</div>
                  <Badge color={diff===0?"green":"red"}>{diff===0?"✓ OK":`Dif ${fmt(Math.abs(diff))}`}</Badge>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// SOCIOS
// ══════════════════════════════════════════
function Socios({db}){
  const [socios,setSocios]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [modal,setModal]=useState(false);
  const [guardando,setGuardando]=useState(false);
  const [buscar,setBuscar]=useState("");
  const [form,setForm]=useState({nombre:"",cedula:"",telefono:"",email:"",saldo_ahorro:"0",saldo_credito:"0",cuota_mensual:"0",fecha_vence:""});

  const cargar=useCallback(async()=>{
    setLoading(true);
    const {data,error:e}=await db.from("socios").select("*").eq("activo",true).order("nombre");
    if(e){setError(e.message);}else{setSocios(data||[]);}
    setLoading(false);
  },[db]);

  useEffect(()=>{cargar();},[cargar]);

  const guardar=async()=>{
    if(!form.nombre||!form.cedula){return;}
    setGuardando(true);
    const codigo="S"+String(socios.length+1).padStart(3,"0");
    const {error:e}=await db.from("socios").insert([{
      ...form,codigo,
      saldo_ahorro:+form.saldo_ahorro||0,
      saldo_credito:+form.saldo_credito||0,
      cuota_mensual:+form.cuota_mensual||0,
      fecha_vence:form.fecha_vence||null,
      activo:true
    }]);
    if(e){alert("Error: "+e.message);}
    else{await cargar();setModal(false);setForm({nombre:"",cedula:"",telefono:"",email:"",saldo_ahorro:"0",saldo_credito:"0",cuota_mensual:"0",fecha_vence:""});}
    setGuardando(false);
  };

  const filtrados=socios.filter(s=>
    s.nombre.toLowerCase().includes(buscar.toLowerCase())||
    s.cedula.includes(buscar)||
    (s.telefono||"").includes(buscar)
  );

  if(loading) return <Loader text="Cargando socios..."/>;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{color:C.white,fontSize:20,fontWeight:800}}>Maestro de Socios</h2>
          <p style={{color:C.muted,fontSize:13,marginTop:3}}>{socios.length} socios registrados</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Buscador valor={buscar} onChange={setBuscar} placeholder="🔍 Buscar por nombre, cédula, teléfono..."/>
          <button onClick={()=>setModal(true)} style={{background:C.gold,color:"#000",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Nuevo Socio</button>
        </div>
      </div>

      {error&&<MsgError msg={error} onRetry={cargar}/>}

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#0d1a2e"}}>
            {["Código","Nombre","Cédula","Teléfono","Ahorros","Crédito","Inversión","Próx. Vence","Estado"].map(h=>
              <th key={h} style={{padding:"11px 14px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {filtrados.map((s,i)=>{
              const m=diasMora(s.fecha_vence);
              return(
                <tr key={s.id} style={{background:i%2===0?"transparent":"#0f1a2d",borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:"13px 14px",color:C.muted,fontSize:12,fontFamily:"'DM Mono',monospace"}}>{s.codigo}</td>
                  <td style={{padding:"13px 14px",color:C.white,fontSize:14,fontWeight:600,whiteSpace:"nowrap"}}>{s.nombre}</td>
                  <td style={{padding:"13px 14px",color:C.muted,fontSize:12,fontFamily:"'DM Mono',monospace"}}>{s.cedula}</td>
                  <td style={{padding:"13px 14px",color:C.muted,fontSize:13}}>{s.telefono||"—"}</td>
                  <td style={{padding:"13px 14px",color:C.green,fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt(s.saldo_ahorro)}</td>
                  <td style={{padding:"13px 14px",color:s.saldo_credito>0?C.blue:C.muted,fontSize:13,fontFamily:"'DM Mono',monospace"}}>{s.saldo_credito>0?fmt(s.saldo_credito):"—"}</td>
                  <td style={{padding:"13px 14px",color:s.saldo_inversion>0?C.purple:C.muted,fontSize:13,fontFamily:"'DM Mono',monospace"}}>{s.saldo_inversion>0?fmt(s.saldo_inversion):"—"}</td>
                  <td style={{padding:"13px 14px",color:m>0?C.red:C.muted,fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(s.fecha_vence)}</td>
                  <td style={{padding:"13px 14px"}}>
                    {s.saldo_credito===0?<Badge color="green">Al día</Badge>:m>0?<Badge color={m>15?"red":"yellow"}>{m}d mora</Badge>:<Badge color="blue">Activo</Badge>}
                  </td>
                </tr>
              );
            })}
            {filtrados.length===0&&<tr><td colSpan={9} style={{padding:40,textAlign:"center",color:C.muted}}>No se encontraron socios</td></tr>}
          </tbody>
        </table>
      </div>

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{color:C.white,margin:"0 0 20px",fontSize:17,fontWeight:700}}>Registrar Nuevo Socio</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[["Nombre Completo","nombre","text"],["Cédula","cedula","text"],["Teléfono","telefono","text"],["Email","email","email"],["Saldo Ahorro ($)","saldo_ahorro","number"],["Saldo Crédito ($)","saldo_credito","number"],["Cuota Mensual ($)","cuota_mensual","number"],["Fecha Vence","fecha_vence","date"]].map(([lbl,key,type])=>(
                <div key={key}>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4}}>{lbl}</label>
                  <input type={type} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))}
                    style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.white,fontSize:13}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={guardar} disabled={guardando} style={{flex:1,background:guardando?"#1e2d45":C.gold,color:guardando?C.muted:"#000",border:"none",borderRadius:8,padding:11,fontWeight:700,cursor:guardando?"not-allowed":"pointer"}}>
                {guardando?"Guardando...":"Guardar"}
              </button>
              <button onClick={()=>setModal(false)} style={{flex:1,background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:11,cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// CARTERA
// ══════════════════════════════════════════
function Cartera({db}){
  const [socios,setSocios]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filtro,setFiltro]=useState("todos");
  const [buscar,setBuscar]=useState("");
  const [selSocio,setSelSocio]=useState(null);
  const [planPagos,setPlanPagos]=useState([]);
  const [loadingPlan,setLoadingPlan]=useState(false);

  const cargar=useCallback(async()=>{
    setLoading(true);
    const {data}=await db.from("socios").select("*").eq("activo",true).gt("saldo_credito",0).order("nombre");
    setSocios(data||[]);setLoading(false);
  },[db]);

  useEffect(()=>{cargar();},[cargar]);

  const verPlan=async(socio)=>{
    setSelSocio(socio);setLoadingPlan(true);
    const {data}=await db.from("plan_pagos").select("*").eq("socio_id",socio.id).order("num_cuota");
    setPlanPagos(data||[]);setLoadingPlan(false);
  };

  const cartera=socios;
  const carteraFiltrada=filtro==="todos"?cartera:filtro==="mora"?cartera.filter(s=>diasMora(s.fecha_vence)>0):cartera.filter(s=>diasMora(s.fecha_vence)===0);
  const filtrados=buscar?carteraFiltrada.filter(s=>
    s.nombre.toLowerCase().includes(buscar.toLowerCase())||
    s.cedula.includes(buscar)||
    (s.telefono||"").includes(buscar)||
    (s.codigo||"").includes(buscar)
  ):carteraFiltrada;
  const totalC=cartera.reduce((a,s)=>a+s.saldo_credito,0);
  const totalM=cartera.filter(s=>diasMora(s.fecha_vence)>0).reduce((a,s)=>a+s.saldo_credito,0);
  const indM=totalC>0?((totalM/totalC)*100).toFixed(1):0;

  if(loading) return <Loader text="Cargando cartera..."/>;

  return(
    <div>
      <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Cartera de Crédito</h2>
      <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Seguimiento de préstamos activos</p>

      <div className="stat-grid" style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        <StatCard label="Cartera Total" value={fmt(totalC)} color={C.blue}/>
        <StatCard label="En Mora" value={fmt(totalM)} sub={`${cartera.filter(s=>diasMora(s.fecha_vence)>0).length} créditos`} color={C.red}/>
        <StatCard label="Índice de Mora" value={`${indM}%`} sub="sobre total cartera" color={+indM>5?C.red:C.green}/>
        <StatCard label="Créditos Activos" value={cartera.length} color={C.gold}/>
      </div>

      <Buscador valor={buscar} onChange={setBuscar} placeholder="🔍 Buscar por nombre, cédula, código..."/>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["todos","Todos"],["activos","Al Día"],["mora","En Mora"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltro(v)} style={{background:filtro===v?C.gold:C.card,color:filtro===v?"#000":C.muted,border:`1px solid ${filtro===v?C.gold:C.border}`,borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#0d1a2e"}}>
            {["Socio","Capital","Cuota","Vence","Mora","Estado",""].map(h=>
              <th key={h} style={{padding:"11px 14px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {filtrados.map((s,i)=>{
              const m=diasMora(s.fecha_vence);
              const intM=(s.saldo_credito*MORA_DIARIA*m).toFixed(2);
              return(
                <tr key={s.id} style={{background:m>0?"rgba(239,68,68,0.04)":i%2===0?"transparent":"#0f1a2d",borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:"13px 14px",color:C.white,fontSize:14,fontWeight:600,whiteSpace:"nowrap"}}>{s.nombre}</td>
                  <td style={{padding:"13px 14px",color:C.white,fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt(s.saldo_credito)}</td>
                  <td style={{padding:"13px 14px",color:C.blue,fontSize:13,fontFamily:"'DM Mono',monospace"}}>{fmt(s.cuota_mensual)}</td>
                  <td style={{padding:"13px 14px",color:m>0?C.red:C.muted,fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(s.fecha_vence)}</td>
                  <td style={{padding:"13px 14px"}}>
                    {m>0?<div><div style={{color:C.red,fontWeight:700,fontSize:13}}>{m} días</div><div style={{color:C.muted,fontSize:11}}>Int: ${intM}</div></div>:<span style={{color:C.muted}}>—</span>}
                  </td>
                  <td style={{padding:"13px 14px"}}><Badge color={m>15?"red":m>0?"yellow":"green"}>{m>15?"Crítico":m>0?"En Mora":"Al Día"}</Badge></td>
                  <td style={{padding:"13px 14px"}}>
                    <button onClick={()=>verPlan(s)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.gold,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Ver tabla</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Modal plan de pagos */}
      {selSocio&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,width:"100%",maxWidth:680,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{color:C.gold,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Tabla de Amortización</div>
                <div style={{color:C.white,fontSize:16,fontWeight:800,marginTop:2}}>{selSocio.nombre}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:1}}>Crédito activo: {fmt(selSocio.saldo_credito)} · Cuota: {fmt(selSocio.cuota_mensual)}/mes</div>
              </div>
              <button onClick={()=>setSelSocio(null)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>✕ Cerrar</button>
            </div>
            {loadingPlan?<Loader text="Cargando plan de pagos..."/>:
              planPagos.length===0
                ?<div style={{textAlign:"center",padding:30,color:C.muted}}>No hay plan de pagos registrado. Se genera automáticamente al crear el crédito en Supabase.</div>
                :<table>
                  <thead><tr style={{background:"#0d1a2e"}}>
                    {["#","Fecha","Cuota","Capital","Interés","Saldo","Estado"].map(h=>
                      <th key={h} style={{padding:"9px 12px",textAlign:"right",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                    )}
                  </tr></thead>
                  <tbody>
                    {planPagos.map((p,i)=>(
                      <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`,background:p.estado==="pagado"?"#052e16":p.estado==="mora"?"#2d0a0a":i%2===0?"transparent":"#0f1a2d"}}>
                        <td style={{padding:"8px 12px",color:C.muted,fontSize:12,textAlign:"right"}}>{p.num_cuota}</td>
                        <td style={{padding:"8px 12px",color:C.muted,fontSize:12,textAlign:"right",whiteSpace:"nowrap"}}>{fmtDate(p.fecha_vence)}</td>
                        <td style={{padding:"8px 12px",color:C.gold,fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:700,textAlign:"right"}}>{fmt(p.monto_cuota)}</td>
                        <td style={{padding:"8px 12px",color:C.blue,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.capital)}</td>
                        <td style={{padding:"8px 12px",color:C.red,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.interes)}</td>
                        <td style={{padding:"8px 12px",color:C.white,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.saldo)}</td>
                        <td style={{padding:"8px 12px",textAlign:"right"}}><Badge color={p.estado==="pagado"?"green":p.estado==="mora"?"red":"gray"}>{p.estado}</Badge></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════
// TRANSACCIONES
// ══════════════════════════════════════════
function Transacciones({db,sesion}){
  const [socios,setSocios]=useState([]);
  const [cuentas,setCuentas]=useState([]);
  const [historial,setHistorial]=useState([]);
  const [loading,setLoading]=useState(true);
  const [procesando,setProcesando]=useState(false);
  const [error,setError]=useState("");
  const [confirmacion,setConfirmacion]=useState(null);
  const [copiado,setCopiado]=useState(false);
  const [tipo,setTipo]=useState("deposito");
  const [buscarSocio,setBuscarSocio]=useState("");
  const [verTabla,setVerTabla]=useState(false);
  const [form,setForm]=useState({socioId:"",monto:"",fecha:new Date().toISOString().split("T")[0],cuentaId:"",nota:"",voucher:"",plazo:"12"});

  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  // ── LECTOR DE COMPROBANTE CON IA ─────────────────────────
  const [leyendoComp,setLeyendoComp]=useState(false);
  const [compImagen,setCompImagen]=useState(null);
  const [compResultado,setCompResultado]=useState(null);
  const [compError,setCompError]=useState("");

  const leerComprobante=async(archivo)=>{
    if(!archivo) return;
    setLeyendoComp(true);setCompError("");setCompResultado(null);
    try{
      const reader=new FileReader();
      reader.onload=async(e)=>{
        const base64=e.target.result.split(",")[1];
        const mediaType=archivo.type||"image/jpeg";
        setCompImagen(e.target.result);
        try{
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1000,
              messages:[{
                role:"user",
                content:[
                  {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
                  {type:"text",text:`Eres un asistente de una caja de ahorro ecuatoriana. Lee este comprobante de pago/deposito bancario y extrae la informacion. Responde SOLO en JSON valido con estos campos: {"monto":numero,"fecha":"YYYY-MM-DD","voucher":"numero referencia","tipo":"deposito o pago_cuota","banco":"nombre banco","nota":"descripcion breve"}. Si no puedes leer algun campo ponlo null. No incluyas texto fuera del JSON.`}
                ]
              }]
            })
          });
          const data=await resp.json();
          const texto=data.content[0].text;
          const resultado=JSON.parse(texto.replace(/```json|```/g,"").trim());
          setCompResultado(resultado);
          if(resultado.monto) f("monto",String(resultado.monto));
          if(resultado.fecha) f("fecha",resultado.fecha);
          if(resultado.voucher) f("voucher",resultado.voucher);
          if(resultado.tipo) setTipo(resultado.tipo);
          if(resultado.nota) f("nota",resultado.nota);
        }catch(err){setCompError("No se pudo leer el comprobante. Llena el formulario manualmente.");}
        setLeyendoComp(false);
      };
      reader.readAsDataURL(archivo);
    }catch(err){setCompError(err.message);setLeyendoComp(false);}
  };

  const TIPOS=[
    {id:"deposito",   icon:"💰",label:"Depósito de Ahorro",   color:C.green,  desc:"El socio deposita en sus ahorros"},
    {id:"pago_cuota", icon:"💳",label:"Pago de Cuota",        color:C.blue,   desc:"Pago de cuota de crédito activo"},
    {id:"desembolso", icon:"📤",label:"Desembolso de Crédito",color:C.purple, desc:"Entrega de dinero crédito aprobado"},
    {id:"retiro",     icon:"🏧",label:"Retiro de Ahorros",    color:C.yellow, desc:"El socio retira de sus ahorros"},
    {id:"inversion",  icon:"📈",label:"Pasar a Inversión",    color:C.gold,   desc:"Convierte ahorro en inversión"},
  ];

  const tipoActual=TIPOS.find(t=>t.id===tipo);
  const socioSel=socios.find(s=>s.id===form.socioId);
  const plazo=+form.plazo||12;
  const montoVal=+form.monto||0;
  const reserva=tipo==="desembolso"?+(montoVal*RESERVA_PCT).toFixed(2):0;
  const montoNeto=tipo==="desembolso"?+(montoVal-reserva).toFixed(2):montoVal;
  const cuotaCalc=tipo==="desembolso"&&montoNeto>0?+calcCuota(montoNeto,plazo).toFixed(2):0;

  const calcTabla=(cap,meses)=>{
    const i=TASA_ANUAL/12; let s=cap; const t=[];
    for(let n=1;n<=meses;n++){
      const int=+(s*i).toFixed(2); const cap2=+(+calcCuota(cap,meses).toFixed(2)-int).toFixed(2);
      s=Math.max(0,+(s-cap2).toFixed(2));
      t.push({n,cuota:+calcCuota(cap,meses).toFixed(2),capital:cap2,interes:int,saldo:s});
    }
    return t;
  };

  const cargar=useCallback(async()=>{
    setLoading(true);
    const [{data:s},{data:c}]=await Promise.all([
      db.from("socios").select("*").eq("activo",true).order("nombre"),
      db.from("cuentas_banco").select("*").eq("activa",true),
    ]);
    setSocios(s||[]);setCuentas(c||[]);setLoading(false);
  },[db]);

  useEffect(()=>{cargar();},[cargar]);

  const procesar=async()=>{
    setError("");
    if(!form.socioId){setError("Selecciona un socio.");return;}
    if(montoVal<=0){setError("Ingresa un monto válido.");return;}
    if(tipo==="pago_cuota"&&socioSel?.saldo_credito===0){setError("Este socio no tiene crédito activo.");return;}
    if((tipo==="retiro"||tipo==="inversion")&&socioSel?.saldo_credito>0){
      const libre=Math.max(0,socioSel.saldo_ahorro-socioSel.saldo_credito);
      if(montoVal>libre){setError(`⚠️ Ahorro pignorado. Saldo libre: ${fmt(libre)}`);return;}
    }
    if(form.voucher&&historial.some(h=>h.voucher===form.voucher.trim())){
      setError(`⚠️ Voucher #${form.voucher} ya registrado. Posible duplicado.`);return;
    }

    setProcesando(true);
    try{
      // Insertar transacción (los triggers actualizan el saldo automáticamente)
      const {error:e}=await db.from("transacciones").insert([{
        socio_id:form.socioId,
        tipo,
        monto:tipo==="desembolso"?montoNeto:montoVal,
        fecha:form.fecha,
        cuenta_id:form.cuentaId||null,
        descripcion:`${tipoActual.label} — ${socioSel.nombre} · ${socioSel.cedula}${form.nota?" | "+form.nota:""}`,
        voucher:form.voucher||null,
        usuario:sesion.nombre,
      }]);
      if(e) throw e;

      // Si es desembolso, crear el préstamo (genera plan de pagos automáticamente via trigger)
      if(tipo==="desembolso"){
        const fechaPrimera=new Date(new Date(form.fecha).getTime()+30*86400000).toISOString().split("T")[0];
        const {error:e2}=await db.from("prestamos").insert([{
          socio_id:form.socioId,
          monto_aprobado:montoVal,
          monto_entregado:montoNeto,
          reserva_legal:reserva,
          tasa_anual:TASA_ANUAL*100,
          plazo_meses:plazo,
          cuota_mensual:cuotaCalc,
          fecha_desembolso:form.fecha,
          fecha_primera_cuota:fechaPrimera,
          saldo_actual:montoNeto,
        }]);
        if(e2) throw e2;
      }

      // Agregar movimiento bancario si hay cuenta
      if(form.cuentaId){
        await db.from("movimientos_banco").insert([{
          cuenta_id:form.cuentaId,
          fecha:form.fecha,
          descripcion:`${tipoActual.label} — ${socioSel.nombre} · ${socioSel.cedula}`,
          monto:["retiro","desembolso","inversion"].includes(tipo)?-montoVal:montoVal,
          conciliado:false,
        }]);
      }

      // Recargar socio actualizado
      const {data:socioUpd}=await db.from("socios").select("*").eq("id",form.socioId).single();

      // Mensaje WhatsApp
      const hoyStr=new Date().toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"});
      let msg="";
      if(tipo==="deposito"){
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *¡Depósito Confirmado!*\n\nHola ${socioSel.nombre} 👋\n\nAcabas de añadir *${fmt(montoVal)}* a tu ahorro.\n\n💰 Nuevo saldo: *${fmt(socioUpd?.saldo_ahorro||0)}*\n📅 Fecha: ${hoyStr}\n\n¡Sigue así! 💪\n_Caja de Ahorro CADENA_ 🤝`;
      } else if(tipo==="pago_cuota"){
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *¡Pago Registrado!*\n\nHola ${socioSel.nombre} 👋\n\nHemos recibido tu pago de *${fmt(montoVal)}*.\n\n📉 Saldo restante: *${fmt(socioUpd?.saldo_credito||0)}*\n📅 Fecha: ${hoyStr}\n\n${(socioUpd?.saldo_credito||0)===0?"🎉 *¡Crédito cancelado!* ¡Felicitaciones!":"✅ Tu crédito está al día"}\n_Caja de Ahorro CADENA_ 🤝`;
      } else {
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *Transacción Confirmada*\n\nHola ${socioSel.nombre} 👋\n\n${tipoActual.label}: *${fmt(montoVal)}*\n📅 Fecha: ${hoyStr}\n\n_Caja de Ahorro CADENA_ 🤝`;
      }

      const entrada={id:Date.now(),tipo,icono:tipoActual.icon,label:tipoActual.label,nombre:socioSel.nombre,cedula:socioSel.cedula,monto:montoVal,voucher:form.voucher,color:tipoActual.color};
      setHistorial(p=>[entrada,...p]);
      setConfirmacion({socio:socioSel,socioUpd,monto:montoVal,tipo,label:tipoActual.label,color:tipoActual.color,reserva,cuota:cuotaCalc,msgWsp:msg,linkWsp:`https://wa.me/593${socioSel.telefono?.replace(/^0/,"")}?text=${encodeURIComponent(msg)}`});
      setForm({socioId:"",monto:"",fecha:new Date().toISOString().split("T")[0],cuentaId:"",nota:"",voucher:"",plazo:"12"});
      setVerTabla(false);
    }catch(e){setError("Error: "+e.message);}
    setProcesando(false);
  };

  const cuentasFilt=()=>{
    if(tipo==="pago_cuota"||tipo==="deposito") return cuentas.filter(c=>c.tipo==="Cobranza"||c.tipo==="Ahorros");
    if(tipo==="desembolso") return cuentas.filter(c=>c.tipo==="Desembolsos");
    return cuentas;
  };

  if(loading) return <Loader text="Cargando transacciones..."/>;

  return(
    <div>
      <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Registro de Transacciones</h2>
      <p style={{color:C.muted,fontSize:13,marginBottom:20}}>{historial.length} transacciones en esta sesión</p>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
        {/* FORMULARIO — altura fija con scroll */}
        <div style={{height:"calc(100vh - 200px)",overflowY:"auto",paddingRight:8,scrollbarWidth:"thin"}}>
          {/* Buscador socio rápido */}
          <Buscador valor={buscarSocio} onChange={v=>{setBuscarSocio(v);if(!v)f("socioId","");}} placeholder="🔍 Buscar socio por nombre o cédula..."/>
          {/* Selector tipo */}
          <div style={{marginBottom:16}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Tipo de Transacción</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {TIPOS.map(t=>(
                <button key={t.id} onClick={()=>{setTipo(t.id);setError("");setConfirmacion(null);}} style={{background:tipo===t.id?`${t.color}18`:C.card,border:`2px solid ${tipo===t.id?t.color:C.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                  <div style={{fontSize:18,marginBottom:3}}>{t.icon}</div>
                  <div style={{color:tipo===t.id?t.color:C.white,fontSize:12,fontWeight:700}}>{t.label}</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:1}}>{t.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Formulario */}
          <div style={{background:C.card,border:`2px solid ${tipoActual.color}40`,borderRadius:14,padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:22}}>{tipoActual.icon}</span>
              <div>
                <div style={{color:tipoActual.color,fontSize:13,fontWeight:700}}>{tipoActual.label}</div>
                <div style={{color:C.muted,fontSize:11}}>{tipoActual.desc}</div>
              </div>
            </div>

            <div style={{display:"grid",gap:12}}>
              {/* Socio */}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>👤 Socio *</label>
                <Buscador valor={buscarSocio} onChange={v=>{setBuscarSocio(v);if(!v)f("socioId","");}} placeholder="🔍 Filtrar socio..."/>
                <select value={form.socioId} onChange={e=>f("socioId",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:form.socioId?C.white:C.muted,fontSize:13,cursor:"pointer"}}>
                  <option value="">— Seleccionar socio —</option>
                  {socios.filter(s=>!buscarSocio||s.nombre.toLowerCase().includes(buscarSocio.toLowerCase())||s.cedula.includes(buscarSocio)||(s.telefono||"").includes(buscarSocio)).map(s=><option key={s.id} value={s.id}>{s.nombre} · {s.cedula}</option>)}
                </select>
              </div>

              {/* Info socio */}
              {socioSel&&(
                <div style={{background:C.bg,borderRadius:8,padding:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Ahorros</div>
                    <div style={{color:C.green,fontSize:15,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(socioSel.saldo_ahorro)}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Crédito</div>
                    <div style={{color:socioSel.saldo_credito>0?C.blue:C.muted,fontSize:15,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{socioSel.saldo_credito>0?fmt(socioSel.saldo_credito):"Sin crédito"}</div>
                  </div>
                  {diasMora(socioSel.fecha_vence)>0&&(
                    <div style={{gridColumn:"1/-1",background:"#2d0a0a",borderRadius:6,padding:"6px 10px",textAlign:"center"}}>
                      <span style={{color:C.red,fontSize:12,fontWeight:700}}>⚠️ En mora: {diasMora(socioSel.fecha_vence)} días</span>
                    </div>
                  )}
                </div>
              )}

              {/* Monto */}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>💲 Monto ($) *</label>
                <input type="number" placeholder="0.00" value={form.monto} onChange={e=>f("monto",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:18,fontFamily:"'DM Mono',monospace",fontWeight:800}}/>
                {tipo==="pago_cuota"&&socioSel?.cuota_mensual>0&&(
                  <button onClick={()=>f("monto",socioSel.cuota_mensual.toString())} style={{background:"transparent",border:"none",color:C.gold,fontSize:11,cursor:"pointer",marginTop:4,padding:0}}>
                    → Cuota exacta: {fmt(socioSel.cuota_mensual)}
                  </button>
                )}
              </div>

              {/* Plazo + cálculo automático — solo desembolso */}
              {tipo==="desembolso"&&(
                <div>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📅 Plazo *</label>
                  <select value={form.plazo} onChange={e=>f("plazo",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13,cursor:"pointer"}}>
                    {[3,6,9,12,18,24,36].map(p=><option key={p} value={p}>{p} meses</option>)}
                  </select>
                  {montoVal>0&&(
                    <div style={{marginTop:10,background:"#1a0a2e",border:"1px solid #4c1d95",borderRadius:10,padding:12}}>
                      <div style={{color:"#c4b5fd",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>⚙️ Sistema Francés · 13% anual</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Bruto</div><div style={{color:C.white,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(montoVal)}</div></div>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Reserva 3%</div><div style={{color:C.red,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>-{fmt(reserva)}</div></div>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Entregado</div><div style={{color:C.green,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(montoNeto)}</div></div>
                      </div>
                      <div style={{background:"rgba(139,92,246,0.15)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{color:"#c4b5fd",fontSize:12,fontWeight:700}}>Cuota mensual:</span>
                        <span style={{color:C.gold,fontSize:18,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(cuotaCalc)}</span>
                      </div>
                      <button onClick={()=>setVerTabla(!verTabla)} style={{marginTop:8,background:"transparent",border:"none",color:"#a78bfa",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
                        {verTabla?"▲ Ocultar tabla":"▼ Ver tabla de amortización"}
                      </button>
                    </div>
                  )}
                  {verTabla&&montoNeto>0&&(
                    <div style={{marginTop:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                      <table style={{fontSize:11}}>
                        <thead><tr style={{background:"#0d1a2e",position:"sticky",top:0}}>
                          {["#","Cuota","Capital","Interés","Saldo"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"right",color:C.muted,fontWeight:700,fontSize:9,textTransform:"uppercase"}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {calcTabla(montoNeto,plazo).map((r,i)=>(
                            <tr key={r.n} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?"transparent":"#0f1a2d"}}>
                              <td style={{padding:"5px 10px",color:C.muted,textAlign:"right"}}>{r.n}</td>
                              <td style={{padding:"5px 10px",color:C.gold,fontFamily:"'DM Mono',monospace",textAlign:"right",fontWeight:700}}>{fmt(r.cuota)}</td>
                              <td style={{padding:"5px 10px",color:C.blue,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.capital)}</td>
                              <td style={{padding:"5px 10px",color:C.red,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.interes)}</td>
                              <td style={{padding:"5px 10px",color:C.white,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.saldo)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}

              {/* Fecha */}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📅 Fecha *</label>
                <input type="date" value={form.fecha} onChange={e=>f("fecha",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
              </div>

              {/* Voucher */}
              {(tipo==="deposito"||tipo==="pago_cuota")&&(
                <div>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>🧾 N° Voucher / Comprobante</label>
                  <input type="text" placeholder="Ej: TRX-20260318-001" value={form.voucher} onChange={e=>f("voucher",e.target.value)}
                    style={{width:"100%",background:C.bg,border:`1px solid ${historial.some(h=>h.voucher&&h.voucher===form.voucher.trim()&&form.voucher)?C.red:C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
                  {form.voucher&&historial.some(h=>h.voucher===form.voucher.trim())&&(
                    <div style={{color:C.red,fontSize:11,marginTop:3,fontWeight:600}}>⚠️ Voucher ya registrado. Verifica duplicado.</div>
                  )}
                </div>
              )}

              {/* Cuenta bancaria */}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>🏦 Cuenta Bancaria</label>
                <select value={form.cuentaId} onChange={e=>f("cuentaId",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:form.cuentaId?C.white:C.muted,fontSize:13,cursor:"pointer"}}>
                  <option value="">— Seleccionar cuenta —</option>
                  {cuentasFilt().map(c=><option key={c.id} value={c.id}>{c.banco} · {c.tipo} {c.numero}</option>)}
                </select>
              </div>

              {/* Nota */}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📝 Nota (opcional)</label>
                <input type="text" placeholder="Referencia adicional..." value={form.nota} onChange={e=>f("nota",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
              </div>
            </div>

            {error&&<div style={{background:"#2d0a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:"10px 14px",marginTop:14,color:"#f87171",fontSize:13}}>⚠️ {error}</div>}

            <button onClick={procesar} disabled={procesando} style={{width:"100%",marginTop:16,background:procesando?"#1e2d45":`linear-gradient(135deg,${tipoActual.color},${tipoActual.color}aa)`,color:procesando?C.muted:"#fff",border:"none",borderRadius:10,padding:14,fontWeight:700,fontSize:14,cursor:procesando?"not-allowed":"pointer",boxShadow:procesando?"none":`0 4px 14px ${tipoActual.color}40`,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {procesando?<><span className="spin">⟳</span> Registrando...</>:<>{tipoActual.icon} Registrar {tipoActual.label}</>}
            </button>
          </div>
        </div>

        {/* PANEL DERECHO */}
        <div>
          {/* Confirmación */}
          {confirmacion&&(
            <div style={{background:"#052e16",border:`2px solid ${C.green}`,borderRadius:16,padding:20,marginBottom:16,animation:"fadeIn 0.3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{fontSize:26}}>✅</div>
                <div>
                  <div style={{color:C.green,fontSize:12,fontWeight:700}}>¡Guardado en Supabase!</div>
                  <div style={{color:C.white,fontSize:15,fontWeight:800}}>{confirmacion.label} — {fmt(confirmacion.monto)}</div>
                  <div style={{color:C.muted,fontSize:12,marginTop:1}}>{confirmacion.socio.nombre}</div>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Nuevo Saldo Ahorro</div>
                  <div style={{color:C.green,fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(confirmacion.socioUpd?.saldo_ahorro||0)}</div>
                </div>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Saldo Crédito</div>
                  <div style={{color:(confirmacion.socioUpd?.saldo_credito||0)>0?C.blue:C.green,fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{(confirmacion.socioUpd?.saldo_credito||0)>0?fmt(confirmacion.socioUpd.saldo_credito):"✓ Cancelado"}</div>
                </div>
              </div>

              {confirmacion.tipo==="desembolso"&&confirmacion.reserva>0&&(
                <div style={{background:"#1a0a2e",border:"1px solid #4c1d95",borderRadius:8,padding:10,marginBottom:12}}>
                  <div style={{color:"#c4b5fd",fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>📒 Asiento Contable</div>
                  <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",lineHeight:2}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.blue}}>Db. Cartera de Crédito</span><span style={{color:C.white}}>{fmt(confirmacion.socioUpd?.saldo_credito||0)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.blue}}>Db. Reserva Legal 3%</span><span style={{color:C.white}}>{fmt(confirmacion.reserva)}</span></div>
                    <div style={{height:1,background:C.border,margin:"3px 0"}}/>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.green}}>Cr. Bancos / Tesorería</span><span style={{color:C.white}}>{fmt(confirmacion.monto)}</span></div>
                  </div>
                  <div style={{color:"#a78bfa",fontSize:10,marginTop:4}}>Cuota: {fmt(confirmacion.cuota)} · 13% anual · Sistema Francés · Plan de pagos generado ✓</div>
                </div>
              )}

              {/* Burbuja WhatsApp */}
              <div style={{background:"#0a1a0f",borderRadius:10,padding:12,marginBottom:12,border:"1px solid #14532d"}}>
                <div style={{color:C.green,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>📱 Mensaje para {confirmacion.socio.nombre}</div>
                <div style={{background:"#1a3a2a",borderRadius:"4px 12px 12px 12px",padding:"10px 12px"}}>
                  <pre style={{color:"#e9ffef",fontSize:10,lineHeight:1.8,whiteSpace:"pre-wrap",fontFamily:"'DM Mono',monospace",margin:0}}>{confirmacion.msgWsp}</pre>
                  <div style={{color:"#6b9b7a",fontSize:9,marginTop:4,textAlign:"right"}}>{new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"})} ✓✓</div>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <a href={confirmacion.linkWsp} target="_blank" rel="noopener noreferrer"
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#128C7E",color:"#fff",borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,textDecoration:"none"}}>
                  📱 WhatsApp
                </a>
                <button onClick={()=>{navigator.clipboard.writeText(confirmacion.msgWsp).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000);});}}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:copiado?C.green:C.surface,color:copiado?"#fff":C.text,border:`1px solid ${copiado?C.green:C.border}`,borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {copiado?"✅ Copiado":"📋 Copiar"}
                </button>
                <button onClick={()=>setConfirmacion(null)}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  ✕ Cerrar
                </button>
              </div>
            </div>
          )}

          {/* Historial sesión */}
          <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Historial de esta sesión</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",maxHeight:"calc(100vh - 400px)",overflowY:"auto"}}>
            {historial.length===0
              ?<div style={{padding:40,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>📋</div>
                <div style={{color:C.white,fontSize:13,fontWeight:600,marginBottom:4}}>Sin transacciones aún</div>
                <div style={{color:C.muted,fontSize:11}}>Aparecerán aquí al registrar</div>
              </div>
              :historial.map((h,i)=>(
                <div key={h.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,background:i%2===0?"transparent":"#0f1a2d"}}>
                  <div style={{width:34,height:34,borderRadius:8,background:`${h.color}18`,border:`1px solid ${h.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{h.icono}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:C.white,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nombre}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:1}}>{h.label}{h.voucher&&` · #${h.voucher}`}</div>
                  </div>
                  <div style={{color:["deposito","pago_cuota"].includes(h.tipo)?C.green:C.red,fontSize:14,fontWeight:800,fontFamily:"'DM Mono',monospace",flexShrink:0}}>
                    {["deposito","pago_cuota"].includes(h.tipo)?"+":"-"}{fmt(h.monto)}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}
