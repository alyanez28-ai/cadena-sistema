  const [buscarSocio,setBuscarSocio]=useState("");
  const [verTabla,setVerTabla]=useState(false);
  const [form,setForm]=useState({socioId:"",monto:"",fecha:new Date().toISOString().split("T")[0],cuentaId:"",nota:"",voucher:"",plazo:"12"});

  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const TIPOS=[
    {id:"deposito",   icon:"💰",label:"Depósito de Ahorro",   color:C.green,  desc:"El socio deposita en sus ahorros"},
    {id:"pago_cuota", icon:"💳",label:"Pago de Cuota",        color:C.blue,   desc:"Pago de cuota de crédito activo"},
    {id:"desembolso", icon:"📤",label:"Desembolso de Crédito",color:C.purple, desc:"Entrega de dinero crédito aprobado"},
    {id:"retiro",     icon:"🏧",label:"Retiro de Ahorros",    color:C.yellow, desc:"El socio retira de sus ahorros"},
    {id:"inversion",  icon:"📈",label:"Pasar a Inversión",    color:C.gold,   desc:"Convierte ahorro en inversión"},
  ];

  const tipoActual=TIPOS.find(t=>t.id===tipo);
  const socioSel=socios.find(s=>s.id===form.socioId);
  const plazo=+form.plazo||12;
  const montoVal=+form.monto||0;
  const reserva=tipo==="desembolso"?+(montoVal*RESERVA_PCT).toFixed(2):0;
  const montoNeto=tipo==="desembolso"?+(montoVal-reserva).toFixed(2):montoVal;
  const cuotaCalc=tipo==="desembolso"&&montoNeto>0?+calcCuota(montoNeto,plazo).toFixed(2):0;

  const calcTabla=(cap,meses)=>{
    const i=TASA_ANUAL/12; let s=cap; const t=[];
    for(let n=1;n<=meses;n++){
      const int=+(s*i).toFixed(2); const cap2=+(+calcCuota(cap,meses).toFixed(2)-int).toFixed(2);
      s=Math.max(0,+(s-cap2).toFixed(2));
      t.push({n,cuota:+calcCuota(cap,meses).toFixed(2),capital:cap2,interes:int,saldo:s});
    }
    return t;
  };

  const cargar=useCallback(async()=>{
    setLoading(true);
    const [{data:s},{data:c}]=await Promise.all([
      db.from("socios").select("*").eq("activo",true).order("nombre"),
      db.from("cuentas_banco").select("*").eq("activa",true),
    ]);
    setSocios(s||[]);setCuentas(c||[]);setLoading(false);
  },[db]);

  useEffect(()=>{cargar();},[cargar]);

  const procesar=async()=>{
    setError("");
    if(!form.socioId){setError("Selecciona un socio.");return;}
    if(montoVal<=0){setError("Ingresa un monto válido.");return;}
    if(tipo==="pago_cuota"&&socioSel?.saldo_credito===0){setError("Este socio no tiene crédito activo.");return;}
    if((tipo==="retiro"||tipo==="inversion")&&socioSel?.saldo_credito>0){
      const libre=Math.max(0,socioSel.saldo_ahorro-socioSel.saldo_credito);
      if(montoVal>libre){setError(`⚠️ Ahorro pignorado. Saldo libre: ${fmt(libre)}`);return;}
    }
    if(form.voucher&&historial.some(h=>h.voucher===form.voucher.trim())){
      setError(`⚠️ Voucher #${form.voucher} ya registrado. Posible duplicado.`);return;
    }
    setProcesando(true);
    try{
      const {error:e}=await db.from("transacciones").insert([{
        socio_id:form.socioId,
        tipo,
        monto:tipo==="desembolso"?montoNeto:montoVal,
        fecha:form.fecha,
        cuenta_id:form.cuentaId||null,
        descripcion:`${tipoActual.label} — ${socioSel.nombre} · ${socioSel.cedula}${form.nota?" | "+form.nota:""}`,
        voucher:form.voucher||null,
        usuario:sesion.nombre,
      }]);
      if(e) throw e;
      if(tipo==="desembolso"){
        const fechaPrimera=new Date(new Date(form.fecha).getTime()+30*86400000).toISOString().split("T")[0];
        const {error:e2}=await db.from("prestamos").insert([{
          socio_id:form.socioId,
          monto_aprobado:montoVal,
          monto_entregado:montoNeto,
          reserva_legal:reserva,
          tasa_anual:TASA_ANUAL*100,
          plazo_meses:plazo,
          cuota_mensual:cuotaCalc,
          fecha_desembolso:form.fecha,
          fecha_primera_cuota:fechaPrimera,
          saldo_actual:montoNeto,
        }]);
        if(e2) throw e2;
      }
      if(form.cuentaId){
        await db.from("movimientos_banco").insert([{
          cuenta_id:form.cuentaId,
          fecha:form.fecha,
          descripcion:`${tipoActual.label} — ${socioSel.nombre} · ${socioSel.cedula}`,
          monto:["retiro","desembolso","inversion"].includes(tipo)?-montoVal:montoVal,
          conciliado:false,
        }]);
      }
      const {data:socioUpd}=await db.from("socios").select("*").eq("id",form.socioId).single();
      const hoyStr=new Date().toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"});
      let msg="";
      if(tipo==="deposito"){
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *¡Depósito Confirmado!*\n\nHola ${socioSel.nombre} 👋\n\nAcabas de añadir *${fmt(montoVal)}* a tu ahorro.\n\n💰 Nuevo saldo: *${fmt(socioUpd?.saldo_ahorro||0)}*\n📅 Fecha: ${hoyStr}\n\n¡Sigue así! 💪\n_Caja de Ahorro CADENA_ 🤝`;
      } else if(tipo==="pago_cuota"){
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *¡Pago Registrado!*\n\nHola ${socioSel.nombre} 👋\n\nHemos recibido tu pago de *${fmt(montoVal)}*.\n\n📉 Saldo restante: *${fmt(socioUpd?.saldo_credito||0)}*\n📅 Fecha: ${hoyStr}\n\n${(socioUpd?.saldo_credito||0)===0?"🎉 *¡Crédito cancelado!* ¡Felicitaciones!":"✅ Tu crédito está al día"}\n_Caja de Ahorro CADENA_ 🤝`;
      } else {
        msg=`🏦 *CAJA DE AHORRO CADENA*\n━━━━━━━━━━━━━━━━━━━━\n✅ *Transacción Confirmada*\n\nHola ${socioSel.nombre} 👋\n\n${tipoActual.label}: *${fmt(montoVal)}*\n📅 Fecha: ${hoyStr}\n\n_Caja de Ahorro CADENA_ 🤝`;
      }
      const entrada={id:Date.now(),tipo,icono:tipoActual.icon,label:tipoActual.label,nombre:socioSel.nombre,cedula:socioSel.cedula,monto:montoVal,voucher:form.voucher,color:tipoActual.color};
      setHistorial(p=>[entrada,...p]);
      setConfirmacion({socio:socioSel,socioUpd,monto:montoVal,tipo,label:tipoActual.label,color:tipoActual.color,reserva,cuota:cuotaCalc,msgWsp:msg,linkWsp:`https://wa.me/593${socioSel.telefono?.replace(/^0/,"")}?text=${encodeURIComponent(msg)}`});
      setForm({socioId:"",monto:"",fecha:new Date().toISOString().split("T")[0],cuentaId:"",nota:"",voucher:"",plazo:"12"});
      setVerTabla(false);
    }catch(e){setError("Error: "+e.message);}
    setProcesando(false);
  };

  const cuentasFilt=()=>{
    if(tipo==="pago_cuota"||tipo==="deposito") return cuentas.filter(c=>c.tipo==="Cobranza"||c.tipo==="Ahorros");
    if(tipo==="desembolso") return cuentas.filter(c=>c.tipo==="Desembolsos");
    return cuentas;
  };

  if(loading) return <Loader text="Cargando transacciones..."/>;

  return(
    <div>
      <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Registro de Transacciones</h2>
      <p style={{color:C.muted,fontSize:13,marginBottom:20}}>{historial.length} transacciones en esta sesión</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
        <div style={{height:"calc(100vh - 200px)",overflowY:"auto",paddingRight:8,scrollbarWidth:"thin"}}>
          <Buscador valor={buscarSocio} onChange={v=>{setBuscarSocio(v);if(!v)f("socioId","");}} placeholder="🔍 Buscar socio por nombre o cédula..."/>
          <div style={{marginBottom:16}}>
            <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Tipo de Transacción</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {TIPOS.map(t=>(
                <button key={t.id} onClick={()=>{setTipo(t.id);setError("");setConfirmacion(null);}} style={{background:tipo===t.id?`${t.color}18`:C.card,border:`2px solid ${tipo===t.id?t.color:C.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                  <div style={{fontSize:18,marginBottom:3}}>{t.icon}</div>
                  <div style={{color:tipo===t.id?t.color:C.white,fontSize:12,fontWeight:700}}>{t.label}</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:1}}>{t.desc}</div>
                </button>
              ))}
            </div>
          </div>
          <div style={{background:C.card,border:`2px solid ${tipoActual.color}40`,borderRadius:14,padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:22}}>{tipoActual.icon}</span>
              <div>
                <div style={{color:tipoActual.color,fontSize:13,fontWeight:700}}>{tipoActual.label}</div>
                <div style={{color:C.muted,fontSize:11}}>{tipoActual.desc}</div>
              </div>
            </div>
            <div style={{display:"grid",gap:12}}>
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>👤 Socio *</label>
                <Buscador valor={buscarSocio} onChange={v=>{setBuscarSocio(v);if(!v)f("socioId","");}} placeholder="🔍 Filtrar socio..."/>
                <select value={form.socioId} onChange={e=>f("socioId",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:form.socioId?C.white:C.muted,fontSize:13,cursor:"pointer"}}>
                  <option value="">— Seleccionar socio —</option>
                  {socios.filter(s=>!buscarSocio||s.nombre.toLowerCase().includes(buscarSocio.toLowerCase())||s.cedula.includes(buscarSocio)||(s.telefono||"").includes(buscarSocio)).map(s=><option key={s.id} value={s.id}>{s.nombre} · {s.cedula}</option>)}
                </select>
              </div>
              {socioSel&&(
                <div style={{background:C.bg,borderRadius:8,padding:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Ahorros</div>
                    <div style={{color:C.green,fontSize:15,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(socioSel.saldo_ahorro)}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Crédito</div>
                    <div style={{color:socioSel.saldo_credito>0?C.blue:C.muted,fontSize:15,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{socioSel.saldo_credito>0?fmt(socioSel.saldo_credito):"Sin crédito"}</div>
                  </div>
                  {diasMora(socioSel.fecha_vence)>0&&(
                    <div style={{gridColumn:"1/-1",background:"#2d0a0a",borderRadius:6,padding:"6px 10px",textAlign:"center"}}>
                      <span style={{color:C.red,fontSize:12,fontWeight:700}}>⚠️ En mora: {diasMora(socioSel.fecha_vence)} días</span>
                    </div>
                  )}
                </div>
              )}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>💲 Monto ($) *</label>
                <input type="number" placeholder="0.00" value={form.monto} onChange={e=>f("monto",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:18,fontFamily:"'DM Mono',monospace",fontWeight:800}}/>
                {tipo==="pago_cuota"&&socioSel?.cuota_mensual>0&&(
                  <button onClick={()=>f("monto",socioSel.cuota_mensual.toString())} style={{background:"transparent",border:"none",color:C.gold,fontSize:11,cursor:"pointer",marginTop:4,padding:0}}>
                    → Cuota exacta: {fmt(socioSel.cuota_mensual)}
                  </button>
                )}
              </div>
              {tipo==="desembolso"&&(
                <div>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📅 Plazo *</label>
                  <select value={form.plazo} onChange={e=>f("plazo",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13,cursor:"pointer"}}>
                    {[3,6,9,12,18,24,36].map(p=><option key={p} value={p}>{p} meses</option>)}
                  </select>
                  {montoVal>0&&(
                    <div style={{marginTop:10,background:"#1a0a2e",border:"1px solid #4c1d95",borderRadius:10,padding:12}}>
                      <div style={{color:"#c4b5fd",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>⚙️ Sistema Francés · 13% anual</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Bruto</div><div style={{color:C.white,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(montoVal)}</div></div>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Reserva 3%</div><div style={{color:C.red,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>-{fmt(reserva)}</div></div>
                        <div style={{textAlign:"center"}}><div style={{color:C.muted,fontSize:9,textTransform:"uppercase",marginBottom:2}}>Entregado</div><div style={{color:C.green,fontSize:13,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(montoNeto)}</div></div>
                      </div>
                      <div style={{background:"rgba(139,92,246,0.15)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{color:"#c4b5fd",fontSize:12,fontWeight:700}}>Cuota mensual:</span>
                        <span style={{color:C.gold,fontSize:18,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(cuotaCalc)}</span>
                      </div>
                      <button onClick={()=>setVerTabla(!verTabla)} style={{marginTop:8,background:"transparent",border:"none",color:"#a78bfa",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
                        {verTabla?"▲ Ocultar tabla":"▼ Ver tabla de amortización"}
                      </button>
                    </div>
                  )}
                  {verTabla&&montoNeto>0&&(
                    <div style={{marginTop:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                      <table style={{fontSize:11}}>
                        <thead><tr style={{background:"#0d1a2e",position:"sticky",top:0}}>
                          {["#","Cuota","Capital","Interés","Saldo"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"right",color:C.muted,fontWeight:700,fontSize:9,textTransform:"uppercase"}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {calcTabla(montoNeto,plazo).map((r,i)=>(
                            <tr key={r.n} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?"transparent":"#0f1a2d"}}>
                              <td style={{padding:"5px 10px",color:C.muted,textAlign:"right"}}>{r.n}</td>
                              <td style={{padding:"5px 10px",color:C.gold,fontFamily:"'DM Mono',monospace",textAlign:"right",fontWeight:700}}>{fmt(r.cuota)}</td>
                              <td style={{padding:"5px 10px",color:C.blue,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.capital)}</td>
                              <td style={{padding:"5px 10px",color:C.red,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.interes)}</td>
                              <td style={{padding:"5px 10px",color:C.white,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(r.saldo)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📅 Fecha *</label>
                <input type="date" value={form.fecha} onChange={e=>f("fecha",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
              </div>
              {(tipo==="deposito"||tipo==="pago_cuota")&&(
                <div>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>🧾 N° Voucher / Comprobante</label>
                  <input type="text" placeholder="Ej: TRX-20260318-001" value={form.voucher} onChange={e=>f("voucher",e.target.value)}
                    style={{width:"100%",background:C.bg,border:`1px solid ${historial.some(h=>h.voucher&&h.voucher===form.voucher.trim()&&form.voucher)?C.red:C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
                  {form.voucher&&historial.some(h=>h.voucher===form.voucher.trim())&&(
                    <div style={{color:C.red,fontSize:11,marginTop:3,fontWeight:600}}>⚠️ Voucher ya registrado. Verifica duplicado.</div>
                  )}
                </div>
              )}
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>🏦 Cuenta Bancaria</label>
                <select value={form.cuentaId} onChange={e=>f("cuentaId",e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:form.cuentaId?C.white:C.muted,fontSize:13,cursor:"pointer"}}>
                  <option value="">— Seleccionar cuenta —</option>
                  {cuentasFilt().map(c=><option key={c.id} value={c.id}>{c.banco} · {c.tipo} {c.numero}</option>)}
                </select>
              </div>
              <div>
                <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:5}}>📝 Nota (opcional)</label>
                <input type="text" placeholder="Referencia adicional..." value={form.nota} onChange={e=>f("nota",e.target.value)}
                  style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.white,fontSize:13}}/>
              </div>
            </div>
            {error&&<div style={{background:"#2d0a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:"10px 14px",marginTop:14,color:"#f87171",fontSize:13}}>⚠️ {error}</div>}
            <button onClick={procesar} disabled={procesando} style={{width:"100%",marginTop:16,background:procesando?"#1e2d45":`linear-gradient(135deg,${tipoActual.color},${tipoActual.color}aa)`,color:procesando?C.muted:"#fff",border:"none",borderRadius:10,padding:14,fontWeight:700,fontSize:14,cursor:procesando?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {procesando?<><span className="spin">⟳</span> Registrando...</>:<>{tipoActual.icon} Registrar {tipoActual.label}</>}
            </button>
          </div>
        </div>
        <div>
          {confirmacion&&(
            <div style={{background:"#052e16",border:`2px solid ${C.green}`,borderRadius:16,padding:20,marginBottom:16,animation:"fadeIn 0.3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{fontSize:26}}>✅</div>
                <div>
                  <div style={{color:C.green,fontSize:12,fontWeight:700}}>¡Guardado en Supabase!</div>
                  <div style={{color:C.white,fontSize:15,fontWeight:800}}>{confirmacion.label} — {fmt(confirmacion.monto)}</div>
                  <div style={{color:C.muted,fontSize:12,marginTop:1}}>{confirmacion.socio.nombre}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Nuevo Saldo Ahorro</div>
                  <div style={{color:C.green,fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(confirmacion.socioUpd?.saldo_ahorro||0)}</div>
                </div>
                <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Saldo Crédito</div>
                  <div style={{color:(confirmacion.socioUpd?.saldo_credito||0)>0?C.blue:C.green,fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{(confirmacion.socioUpd?.saldo_credito||0)>0?fmt(confirmacion.socioUpd.saldo_credito):"✓ Cancelado"}</div>
                </div>
              </div>
              <div style={{background:"#0a1a0f",borderRadius:10,padding:12,marginBottom:12,border:"1px solid #14532d"}}>
                <div style={{color:C.green,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>📱 Mensaje para {confirmacion.socio.nombre}</div>
                <div style={{background:"#1a3a2a",borderRadius:"4px 12px 12px 12px",padding:"10px 12px"}}>
                  <pre style={{color:"#e9ffef",fontSize:10,lineHeight:1.8,whiteSpace:"pre-wrap",fontFamily:"'DM Mono',monospace",margin:0}}>{confirmacion.msgWsp}</pre>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <a href={confirmacion.linkWsp} target="_blank" rel="noopener noreferrer"
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#128C7E",color:"#fff",borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,textDecoration:"none"}}>
                  📱 WhatsApp
                </a>
                <button onClick={()=>{navigator.clipboard.writeText(confirmacion.msgWsp).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000);});}}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:copiado?C.green:C.surface,color:copiado?"#fff":C.text,border:`1px solid ${copiado?C.green:C.border}`,borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {copiado?"✅ Copiado":"📋 Copiar"}
                </button>
                <button onClick={()=>setConfirmacion(null)}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 8px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  ✕ Cerrar
                </button>
              </div>
            </div>
          )}
          <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Historial de esta sesión</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",maxHeight:"calc(100vh - 400px)",overflowY:"auto"}}>
            {historial.length===0
              ?<div style={{padding:40,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>📋</div>
                <div style={{color:C.white,fontSize:13,fontWeight:600,marginBottom:4}}>Sin transacciones aún</div>
                <div style={{color:C.muted,fontSize:11}}>Aparecerán aquí al registrar</div>
              </div>
              :historial.map((h,i)=>(
                <div key={h.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,background:i%2===0?"transparent":"#0f1a2d"}}>
                  <div style={{width:34,height:34,borderRadius:8,background:`${h.color}18`,border:`1px solid ${h.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{h.icono}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:C.white,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nombre}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:1}}>{h.label}{h.voucher&&` · #${h.voucher}`}</div>
                  </div>
                  <div style={{color:["deposito","pago_cuota"].includes(h.tipo)?C.green:C.red,fontSize:14,fontWeight:800,fontFamily:"'DM Mono',monospace",flexShrink:0}}>
                    {["deposito","pago_cuota"].includes(h.tipo)?"+":"-"}{fmt(h.monto)}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// CONCILIACIÓN — con soporte CSV + Excel
// ══════════════════════════════════════════
function Conciliacion({db}){
  const [buscar,setBuscar]=useState("");
  const [cuentas,setCuentas]=useState([]);
  const [movimientos,setMovimientos]=useState([]);
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(true);
  const [loadingMov,setLoadingMov]=useState(false);
  const [modalImport,setModalImport]=useState(false);
  const [step,setStep]=useState(1);
  const [headers,setHeaders]=useState([]);
  const [rawRows,setRawRows]=useState([]);
  const [mapCols,setMapCols]=useState({fecha:"",descripcion:"",monto:""});
  const [nuevoSaldo,setNuevoSaldo]=useState("");
  const [importMsg,setImportMsg]=useState("");
  const [importando,setImportando]=useState(false);
  const [socios,setSocios]=useState([]);

  const cargarCuentas=useCallback(async()=>{
    setLoading(true);
    const [{data:c},{data:s}]=await Promise.all([
      db.from("cuentas_banco").select("*").eq("activa",true),
      db.from("socios").select("id,nombre,cedula").eq("activo",true),
    ]);
    setCuentas(c||[]);setSocios(s||[]);
    if(c&&c.length>0&&!sel){setSel(c[0]);}
    setLoading(false);
  },[db]);

  useEffect(()=>{cargarCuentas();},[cargarCuentas]);

  const cargarMovimientos=useCallback(async(cuentaId)=>{
    if(!cuentaId) return;
    setLoadingMov(true);
    const {data}=await db.from("movimientos_banco").select("*").eq("cuenta_id",cuentaId).order("fecha",{ascending:false}).limit(100);
    setMovimientos(data||[]);setLoadingMov(false);
  },[db]);

  useEffect(()=>{if(sel)cargarMovimientos(sel.id);},[sel,cargarMovimientos]);

  const toggleConciliar=async(mov)=>{
    await db.from("movimientos_banco").update({conciliado:!mov.conciliado}).eq("id",mov.id);
    setMovimientos(prev=>prev.map(m=>m.id===mov.id?{...m,conciliado:!m.conciliado}:m));
  };

  const autoConciliar=async()=>{
    let count=0;
    for(const mov of movimientos.filter(m=>!m.conciliado)){
      const socio=socios.find(s=>mov.descripcion?.includes(s.cedula));
      if(socio){
        await db.from("movimientos_banco").update({conciliado:true}).eq("id",mov.id);
        count++;
      }
    }
    alert(`✅ ${count} movimientos conciliados automáticamente por cédula.`);
    cargarMovimientos(sel.id);
  };

  const parseCSV=(text)=>{
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2) return {headers:[],rows:[]};
    const sep=lines[0].includes(";")?";":",";
    const hdrs=lines[0].split(sep).map(h=>h.replace(/"/g,"").trim());
    const rows=lines.slice(1).map(l=>{
      const vals=l.split(sep).map(v=>v.replace(/"/g,"").trim());
      const obj={};hdrs.forEach((h,i)=>obj[h]=vals[i]||"");return obj;
    });
    return {headers:hdrs,rows};
  };

  // ── Lector unificado: CSV + Excel ──────────────────────
  const leerArchivo=(file)=>{
    const reader=new FileReader();
    const esExcel=file.name.match(/\.(xlsx|xls)$/i);
    reader.onload=(e)=>{
      let hdrs,rows;
      if(esExcel){
        try{
          const wb=XLSX.read(e.target.result,{type:"binary"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(!data||data.length<2){setImportMsg("❌ No se pudo leer el Excel. Verifica el archivo.");return;}
          hdrs=data[0].map(h=>String(h).trim()).filter(h=>h!=="");
          rows=data.slice(1).map(r=>{const obj={};hdrs.forEach((h,i)=>obj[h]=String(r[i]||"").trim());return obj;});
        }catch(err){setImportMsg("❌ Error leyendo Excel: "+err.message);return;}
      }else{
        const res=parseCSV(e.target.result);hdrs=res.headers;rows=res.rows;
      }
      if(!hdrs||!hdrs.length){setImportMsg("❌ No se pudo leer el archivo. Verifica que sea CSV o Excel válido.");return;}
      setHeaders(hdrs);setRawRows(rows);
      setMapCols({
        fecha:hdrs.find(h=>/fecha|date|fec/i.test(h))||"",
        descripcion:hdrs.find(h=>/desc|concepto|detalle|glosa|referencia|ref/i.test(h))||"",
        monto:hdrs.find(h=>/monto|valor|importe|amount|cred|deb/i.test(h))||"",
      });
      setStep(2);
    };
    if(esExcel){reader.readAsBinaryString(file);}else{reader.readAsText(file,"UTF-8");}
  };

  const confirmarImport=async()=>{
    if(!mapCols.fecha||!mapCols.monto){setImportMsg("⚠️ Mapea Fecha y Monto como mínimo.");return;}
    setImportando(true);
    const nuevos=rawRows.map(r=>{
      const montoRaw=(r[mapCols.monto]||"0").replace(/[$,\s]/g,"");
      const monto=parseFloat(montoRaw)||0;
      return{cuenta_id:sel.id,fecha:r[mapCols.fecha]||new Date().toISOString().split("T")[0],descripcion:r[mapCols.descripcion]||"(sin descripción)",monto,conciliado:false};
    }).filter(r=>r.monto!==0);

    const {error:e}=await db.from("movimientos_banco").insert(nuevos);
    if(e){setImportMsg("❌ Error: "+e.message);setImportando(false);return;}

    let autoCont=0;
    for(const mov of nuevos){
      const socio=socios.find(s=>mov.descripcion.includes(s.cedula));
      if(socio) autoCont++;
    }

    if(nuevoSaldo){
      await db.from("cuentas_banco").update({saldo_banco:parseFloat(nuevoSaldo)}).eq("id",sel.id);
    }

    setModalImport(false);setStep(1);setRawRows([]);setHeaders([]);setNuevoSaldo("");setImportMsg("");
    await cargarCuentas();await cargarMovimientos(sel.id);
    alert(`✅ ${nuevos.length} movimientos importados.\n🤖 ${autoCont} pueden auto-conciliarse (tienen cédula en la descripción).`);
    setImportando(false);
  };

  if(loading) return <Loader text="Cargando conciliación..."/>;

  const diff=sel?(sel.saldo_banco-sel.saldo_sistema):0;
  const sinConc=movimientos.filter(m=>!m.conciliado).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Conciliación Bancaria</h2>
          <Buscador valor={buscar} onChange={setBuscar} placeholder="🔍 Buscar movimiento..."/>
          <p style={{color:C.muted,fontSize:13}}>4 cuentas bancarias · Cruce automático por cédula</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={autoConciliar} style={{background:C.surface,color:C.green,border:`1px solid ${C.green}40`,borderRadius:8,padding:"10px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>🤖 Auto-Conciliar</button>
          <button onClick={()=>{setModalImport(true);setStep(1);}} style={{background:C.gold,color:"#000",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>📂 Importar</button>
        </div>
      </div>

      <div className="four-col" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {cuentas.map(c=>{
          const d=c.saldo_banco-c.saldo_sistema;
          const selected=sel?.id===c.id;
          return(
            <button key={c.id} onClick={()=>setSel(c)} style={{background:selected?C.gold:C.card,color:selected?"#000":C.text,border:`1px solid ${selected?C.gold:C.border}`,borderRadius:10,padding:12,cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:12,fontWeight:700}}>{c.banco}</div>
              <div style={{fontSize:10,opacity:0.7,marginTop:2}}>{c.tipo}</div>
              <div style={{fontSize:11,marginTop:4}}>{d===0?"✅ Cuadrado":`⚠️ Dif ${fmt(Math.abs(d))}`}</div>
            </button>
          );
        })}
      </div>

      {sel&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:16}}>
            {[["Saldo Sistema",fmt(sel.saldo_sistema),C.white],["Saldo Banco",fmt(sel.saldo_banco),C.white],["Diferencia",diff===0?"✓ $0.00":fmt(Math.abs(diff)),diff===0?C.green:C.red],["Sin Conciliar",sinConc+" mov.",sinConc>0?C.yellow:C.green]].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>{lbl}</div>
                <div style={{color:col,fontSize:18,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{val}</div>
              </div>
            ))}
          </div>

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 18px",background:"#0d1a2e",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:C.white,fontSize:13,fontWeight:700}}>{sel.banco} — {sel.numero}</span>
              <span style={{color:C.muted,fontSize:12}}>{movimientos.length} movimientos</span>
            </div>
            {loadingMov?<Loader text="Cargando movimientos..."/>:
              movimientos.length===0
                ?<div style={{padding:40,textAlign:"center"}}>
                  <div style={{fontSize:32,marginBottom:8}}>📂</div>
                  <div style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:4}}>Sin movimientos</div>
                  <div style={{color:C.muted,fontSize:12,marginBottom:16}}>Importa el estado de cuenta del banco (CSV o Excel)</div>
                  <button onClick={()=>{setModalImport(true);setStep(1);}} style={{background:C.gold,color:"#000",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,fontSize:13,cursor:"pointer"}}>📂 Importar</button>
                </div>
                :<div style={{overflowX:"auto",maxHeight:420,overflowY:"auto"}}>
                  <table>
                    <thead><tr>
                      {["Fecha","Descripción","Monto","Estado",""].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:"#111827"}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {movimientos.filter(m=>!buscar||m.descripcion?.toLowerCase().includes(buscar.toLowerCase())).map((m,i)=>(
                        <tr key={m.id} style={{borderBottom:`1px solid ${C.border}`,background:m.conciliado?"transparent":"rgba(251,191,36,0.04)"}}>
                          <td style={{padding:"11px 14px",color:C.muted,fontSize:12,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>{fmtDate(m.fecha)}</td>
                          <td style={{padding:"11px 14px",color:C.white,fontSize:13,maxWidth:250,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.descripcion}</td>
                          <td style={{padding:"11px 14px",fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700,color:m.monto>0?C.green:C.red,whiteSpace:"nowrap"}}>{m.monto>0?"+":""}{fmt(Math.abs(m.monto))}</td>
                          <td style={{padding:"11px 14px"}}><Badge color={m.conciliado?"green":"yellow"}>{m.conciliado?"Conciliado":"Pendiente"}</Badge></td>
                          <td style={{padding:"11px 14px"}}>
                            <button onClick={()=>toggleConciliar(m)} style={{background:"transparent",border:`1px solid ${m.conciliado?C.muted:C.gold}`,color:m.conciliado?C.muted:C.gold,borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>
                              {m.conciliado?"Desmarcar":"✓ Conciliar"}
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </>
      )}

      {/* Modal importar CSV / Excel */}
      {modalImport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"}}>

            <div style={{display:"flex",gap:0,marginBottom:24,justifyContent:"center"}}>
              {[["1","Subir"],["2","Mapear"],["3","Confirmar"]].map(([n,lbl],idx)=>(
                <div key={n} style={{display:"flex",alignItems:"center"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                    <div style={{width:28,height:28,borderRadius:99,background:step>idx?C.gold:step===idx+1?C.gold:"transparent",border:`2px solid ${step>=idx+1?C.gold:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:step>=idx+1?"#000":C.muted}}>{step>idx+1?"✓":n}</div>
                    <div style={{fontSize:10,color:step===idx+1?C.gold:C.muted,marginTop:4,fontWeight:600}}>{lbl}</div>
                  </div>
                  {idx<2&&<div style={{width:40,height:2,background:step>idx+1?C.gold:C.border,margin:"0 8px",marginBottom:14}}/>}
                </div>
              ))}
            </div>

            {step===1&&(
              <div>
                <h3 style={{color:C.white,fontSize:16,fontWeight:700,marginBottom:6}}>Importar Estado de Cuenta</h3>
                <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Cuenta: <strong style={{color:C.gold}}>{sel?.banco}</strong></p>
                <div style={{background:C.bg,border:`2px dashed ${C.border}`,borderRadius:12,padding:30,textAlign:"center",marginBottom:14}}>
                  <div style={{fontSize:36,marginBottom:10}}>📄</div>
                  <div style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:6}}>Selecciona el archivo CSV o Excel</div>
                  <div style={{color:C.muted,fontSize:12,marginBottom:16}}>Sube el estado de cuenta del banco en formato CSV o Excel (.xlsx)</div>
                  <input type="file" accept=".csv,.txt,.tsv,.xlsx,.xls" id="fi" style={{display:"none"}} onChange={e=>{if(e.target.files[0])leerArchivo(e.target.files[0]);}}/>
                  <label htmlFor="fi" style={{background:C.gold,color:"#000",borderRadius:8,padding:"10px 24px",fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-block"}}>📂 Elegir archivo</label>
                </div>
                <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:10,padding:12,marginBottom:14}}>
                  <div style={{color:"#60a5fa",fontSize:11,fontWeight:700,marginBottom:6}}>💡 Formatos soportados:</div>
                  <div style={{color:C.muted,fontSize:11,lineHeight:1.9}}>
                    📊 <strong style={{color:C.white}}>Excel (.xlsx)</strong> — Descarga directa desde Banco Pichincha<br/>
                    📄 <strong style={{color:C.white}}>CSV</strong> — Exportación separada por comas<br/>
                    Banca en línea → Cuentas → Movimientos → Exportar
                  </div>
                </div>
                {importMsg&&<div style={{color:C.red,fontSize:13,marginBottom:10}}>{importMsg}</div>}
                <button onClick={()=>{setModalImport(false);setStep(1);}} style={{width:"100%",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:10,cursor:"pointer",fontWeight:600}}>Cancelar</button>
              </div>
            )}

            {step===2&&(
              <div>
                <h3 style={{color:C.white,fontSize:16,fontWeight:700,marginBottom:4}}>Mapear Columnas</h3>
                <p style={{color:C.muted,fontSize:13,marginBottom:16}}><strong style={{color:C.gold}}>{rawRows.length} movimientos</strong> detectados · <strong style={{color:C.gold}}>{headers.length} columnas</strong></p>
                <div style={{display:"grid",gap:12,marginBottom:14}}>
                  {[["📅 Fecha *","fecha"],["📝 Descripción","descripcion"],["💲 Monto *","monto"]].map(([lbl,key])=>(
                    <div key={key}>
                      <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4}}>{lbl}</label>
                      <select value={mapCols[key]} onChange={e=>setMapCols(p=>({...p,[key]:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.white,fontSize:13,cursor:"pointer"}}>
                        <option value="">— Seleccionar columna —</option>
                        {headers.map(h=><option key={h} value={h}>{h}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
                {importMsg&&<div style={{color:C.yellow,fontSize:13,marginBottom:10}}>{importMsg}</div>}
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setStep(1)} style={{flex:1,background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:10,cursor:"pointer",fontWeight:600}}>← Atrás</button>
                  <button onClick={()=>{if(!mapCols.fecha||!mapCols.monto){setImportMsg("⚠️ Selecciona Fecha y Monto.");return;}setStep(3);setImportMsg("");}} style={{flex:2,background:C.gold,color:"#000",border:"none",borderRadius:8,padding:10,cursor:"pointer",fontWeight:700}}>Vista previa →</button>
                </div>
              </div>
            )}

            {step===3&&(
              <div>
                <h3 style={{color:C.white,fontSize:16,fontWeight:700,marginBottom:4}}>Confirmar Importación</h3>
                <p style={{color:C.muted,fontSize:13,marginBottom:14}}><strong style={{color:C.gold}}>{rawRows.length} movimientos</strong> a cargar en <strong style={{color:C.gold}}>{sel?.banco}</strong></p>
                <div style={{background:C.bg,borderRadius:10,overflow:"hidden",marginBottom:14,border:`1px solid ${C.border}`,maxHeight:160,overflowY:"auto"}}>
                  <table style={{fontSize:11}}>
                    <thead><tr style={{background:"#0d1a2e"}}>
                      {["Fecha","Descripción","Monto"].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase"}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {rawRows.slice(0,5).map((r,i)=>{
                        const m=parseFloat((r[mapCols.monto]||"0").replace(/[$,\s]/g,""))||0;
                        return(
                          <tr key={i} style={{borderTop:`1px solid ${C.border}`}}>
                            <td style={{padding:"6px 10px",color:C.muted,whiteSpace:"nowrap"}}>{r[mapCols.fecha]}</td>
                            <td style={{padding:"6px 10px",color:C.white,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r[mapCols.descripcion]||"—"}</td>
                            <td style={{padding:"6px 10px",color:m>0?C.green:C.red,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{m>0?"+":""}{fmt(Math.abs(m))}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {rawRows.length>5&&<div style={{padding:"6px 10px",color:C.muted,fontSize:11,borderTop:`1px solid ${C.border}`,textAlign:"center"}}>...y {rawRows.length-5} más</div>}
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4}}>Saldo según banco ($) — opcional</label>
                  <input type="number" placeholder={`Actual: ${sel?.saldo_banco||0}`} value={nuevoSaldo} onChange={e=>setNuevoSaldo(e.target.value)}
                    style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.white,fontSize:13}}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setStep(2)} style={{flex:1,background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:10,cursor:"pointer",fontWeight:600}}>← Atrás</button>
                  <button onClick={confirmarImport} disabled={importando} style={{flex:2,background:importando?"#1e2d45":C.green,color:importando?C.muted:"#fff",border:"none",borderRadius:8,padding:10,cursor:importando?"not-allowed":"pointer",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    {importando?<><span className="spin">⟳</span> Importando...</>:`✓ Importar ${rawRows.length} movimientos`}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function Reportes({db}){
  const [buscar,setBuscar]=useState("");
  const [mes,setMes]=useState(new Date().getMonth()+1);
  const [anio,setAnio]=useState(new Date().getFullYear());
  const [socios,setSocios]=useState([]);
  const [transacciones,setTransacciones]=useState([]);
  const [loading,setLoading]=useState(false);
  const [generado,setGenerado]=useState(false);

  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const cargar=async()=>{
    setLoading(true);setGenerado(false);
    const fechaIni=`${anio}-${String(mes).padStart(2,"0")}-01`;
    const fechaFin=`${anio}-${String(mes).padStart(2,"0")}-31`;
    const [{data:s},{data:t}]=await Promise.all([
      db.from("socios").select("*").eq("activo",true).order("nombre"),
      db.from("transacciones").select("*").gte("fecha",fechaIni).lte("fecha",fechaFin).order("fecha"),
    ]);
    setSocios(s||[]);setTransacciones(t||[]);
    setLoading(false);setGenerado(true);
  };

  const totalAhorros=socios.reduce((a,s)=>a+s.saldo_ahorro,0);
  const totalCartera=socios.reduce((a,s)=>a+s.saldo_credito,0);
  const sociosMora=socios.filter(s=>s.fecha_vence&&new Date(s.fecha_vence)<new Date()&&s.saldo_credito>0);
  const depositos=transacciones.filter(t=>t.tipo==="deposito");
  const pagos=transacciones.filter(t=>t.tipo==="pago_cuota");
  const desembolsos=transacciones.filter(t=>t.tipo==="desembolso");
  const retiros=transacciones.filter(t=>t.tipo==="retiro");
  const totalDepositos=depositos.reduce((a,t)=>a+t.monto,0);
  const totalPagos=pagos.reduce((a,t)=>a+t.monto,0);
  const totalDesembolsos=desembolsos.reduce((a,t)=>a+t.monto,0);
  const totalRetiros=retiros.reduce((a,t)=>a+t.monto,0);

  const imprimirReporte=()=>{
    const contenido=document.getElementById("reporte-imprimible");
    const ventana=window.open("","_blank");
    ventana.document.write(`<html><head><title>Reporte ${MESES[mes-1]} ${anio} - Financiera CADENA</title>
      <style>body{font-family:Arial,sans-serif;margin:20px;color:#333;}h1{color:#1a3a6b;font-size:20px;}h2{color:#1a3a6b;font-size:15px;margin:20px 0 8px;border-bottom:2px solid #1a3a6b;padding-bottom:4px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px;}th{background:#1a3a6b;color:white;padding:8px;text-align:left;}td{padding:7px 8px;border-bottom:1px solid #eee;}tr:nth-child(even){background:#f8f9fa;}.footer{margin-top:30px;padding-top:10px;border-top:1px solid #ccc;font-size:10px;color:#999;text-align:center;}</style></head><body>${contenido.innerHTML}</body></html>`);
    ventana.document.close();ventana.print();
  };

  const exportarCSV=()=>{
    let csv="REPORTE MENSUAL - FINANCIERA CADENA\n";
    csv+=`Período: ${MESES[mes-1]} ${anio}\n\n`;
    csv+="RESUMEN FINANCIERO\n";
    csv+=`Total Ahorros,$${totalAhorros.toFixed(2)}\nTotal Cartera,$${totalCartera.toFixed(2)}\nSocios en Mora,${sociosMora.length}\n\n`;
    csv+="MOVIMIENTOS DEL MES\n";
    csv+=`Depósitos (${depositos.length}),$${totalDepositos.toFixed(2)}\nPagos de Cuota (${pagos.length}),$${totalPagos.toFixed(2)}\nDesembolsos (${desembolsos.length}),$${totalDesembolsos.toFixed(2)}\nRetiros (${retiros.length}),$${totalRetiros.toFixed(2)}\n\n`;
    csv+="DETALLE DE TRANSACCIONES\nFecha,Tipo,Descripción,Monto\n";
    transacciones.forEach(t=>{csv+=`${t.fecha},${t.tipo},"${t.descripcion||""}",${t.monto}\n`;});
    csv+="\nMAESTRO DE SOCIOS\nCódigo,Nombre,Cédula,Ahorro,Crédito,Estado\n";
    socios.forEach(s=>{
      const mora=s.fecha_vence&&new Date(s.fecha_vence)<new Date()&&s.saldo_credito>0?"En Mora":"Al Día";
      csv+=`${s.codigo},"${s.nombre}",${s.cedula},${s.saldo_ahorro},${s.saldo_credito},${mora}\n`;
    });
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`Reporte_CADENA_${MESES[mes-1]}_${anio}.csv`;a.click();
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{color:C.white,fontSize:20,fontWeight:800,marginBottom:4}}>Reportes Mensuales</h2>
          <Buscador valor={buscar} onChange={setBuscar} placeholder="🔍 Buscar socio en reportes..."/>
          <p style={{color:C.muted,fontSize:13}}>Genera y exporta el informe financiero de la Caja</p>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:20,display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div>
          <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:6}}>📅 Mes</label>
          <select value={mes} onChange={e=>setMes(+e.target.value)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.white,fontSize:13,cursor:"pointer",minWidth:140}}>
            {MESES.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
          </select>
        </div>
        <div>
          <label style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:6}}>📅 Año</label>
          <select value={anio} onChange={e=>setAnio(+e.target.value)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.white,fontSize:13,cursor:"pointer"}}>
            {[2024,2025,2026,2027].map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <button onClick={cargar} disabled={loading} style={{background:loading?"#1e2d45":C.gold,color:loading?C.muted:"#000",border:"none",borderRadius:8,padding:"10px 22px",fontWeight:700,fontSize:13,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:8}}>
          {loading?<><span className="spin">⟳</span> Generando...</>:"📊 Generar Reporte"}
        </button>
        {generado&&(
          <>
            <button onClick={imprimirReporte} style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>🖨️ Imprimir / PDF</button>
            <button onClick={exportarCSV} style={{background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:13,cursor:"pointer"}}>📥 Exportar CSV</button>
          </>
        )}
      </div>

      {!generado&&!loading&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:60,textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>📊</div>
          <div style={{color:C.white,fontSize:16,fontWeight:700,marginBottom:8}}>Selecciona el período</div>
          <div style={{color:C.muted,fontSize:13}}>Elige el mes y año, luego presiona "Generar Reporte"</div>
        </div>
      )}

      {generado&&(
        <div id="reporte-imprimible">
          <div style={{background:"linear-gradient(135deg,#0a1628,#1a2a4a)",border:`1px solid ${C.border}`,borderRadius:12,padding:24,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{color:C.gold,fontSize:20,fontWeight:800}}>FINANCIERA CADENA</div>
              <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>Caja de Ahorro y Crédito</div>
              <div style={{color:C.white,fontSize:16,fontWeight:700,marginTop:8}}>Reporte Mensual — {MESES[mes-1]} {anio}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:C.muted,fontSize:11}}>Fecha de emisión</div>
              <div style={{color:C.white,fontSize:13,fontWeight:600}}>{new Date().toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"})}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:4}}>Total socios activos</div>
              <div style={{color:C.gold,fontSize:18,fontWeight:800}}>{socios.length}</div>
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <div style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>📈 Resumen Financiero</div>
            <div className="stat-grid" style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {[
                ["💰 Total Ahorros",fmt(totalAhorros),C.green],
                ["💳 Cartera Activa",fmt(totalCartera),C.blue],
                ["⚠️ Socios en Mora",sociosMora.length,C.red],
                ["📊 Transacciones",transacciones.length,C.gold],
              ].map(([lbl,val,col])=>(
                <div key={lbl} style={{flex:1,minWidth:140,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16,textAlign:"center"}}>

            </div>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:20}}>
            <div style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:16}}>💸 Movimientos del Mes</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
              {[
                ["💰 Depósitos",depositos.length,totalDepositos,C.green],
                ["💳 Pagos Cuota",pagos.length,totalPagos,C.blue],
                ["📤 Desembolsos",desembolsos.length,totalDesembolsos,C.purple],
                ["🏧 Retiros",retiros.length,totalRetiros,C.yellow],
              ].map(([lbl,cant,total,col])=>(
                <div key={lbl} style={{background:C.bg,borderRadius:8,padding:14,borderLeft:`3px solid ${col}`}}>
                  <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>{lbl}</div>
                  <div style={{color:col,fontSize:18,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(total)}</div>
                  <div style={{color:C.muted,fontSize:11,marginTop:3}}>{cant} operaciones</div>
                </div>
              ))}
            </div>
          </div>

          {transacciones.length>0&&(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"13px 18px",background:"#0d1a2e",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.white,fontSize:13,fontWeight:700}}>📋 Detalle de Transacciones</span>
                <span style={{color:C.muted,fontSize:12}}>{transacciones.length} operaciones</span>
              </div>
              <div style={{overflowX:"auto",maxHeight:320,overflowY:"auto"}}>
                <table>
                  <thead><tr style={{background:"#0d1a2e",position:"sticky",top:0}}>
                    {["Fecha","Tipo","Descripción","Monto"].map(h=>
                      <th key={h} style={{padding:"9px 14px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                    )}
                  </tr></thead>
                  <tbody>
                    {transacciones.filter(t=>!buscar||t.descripcion?.toLowerCase().includes(buscar.toLowerCase())).map((t,i)=>{
                      const TIPOS_COLOR={deposito:C.green,pago_cuota:C.blue,desembolso:C.purple,retiro:C.yellow,inversion:C.gold};
                      const TIPOS_LABEL={deposito:"💰 Depósito",pago_cuota:"💳 Pago Cuota",desembolso:"📤 Desembolso",retiro:"🏧 Retiro",inversion:"📈 Inversión"};
                      const esIngreso=["deposito","pago_cuota"].includes(t.tipo);
                      return(
                        <tr key={t.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"#0f1a2d"}}>
                          <td style={{padding:"9px 14px",color:C.muted,fontSize:12,whiteSpace:"nowrap"}}>{t.fecha}</td>
                          <td style={{padding:"9px 14px"}}><span style={{color:TIPOS_COLOR[t.tipo]||C.muted,fontSize:12,fontWeight:600}}>{TIPOS_LABEL[t.tipo]||t.tipo}</span></td>
                          <td style={{padding:"9px 14px",color:C.white,fontSize:12,maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.descripcion||"—"}</td>
                          <td style={{padding:"9px 14px",color:esIngreso?C.green:C.red,fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700,whiteSpace:"nowrap"}}>
                            {esIngreso?"+":"-"}{fmt(t.monto)}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20,textAlign:"center"}}>
            {["Elaborado por","Revisado por","Aprobado por"].map(rol=>(
              <div key={rol}>
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:30}}>
                  <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>{rol}</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:4}}>Financiera CADENA</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
